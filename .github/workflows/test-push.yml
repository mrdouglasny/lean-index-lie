name: Test Push

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create test file and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "CI push test $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .ci-test
          git add .ci-test
          git commit -m "CI push test"
          git push
